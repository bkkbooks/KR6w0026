body:
  text: 第三言三摩地者真言行人如是觀已云何能證無上菩提第三言等者表當知法爾以下別釋也如是觀已者捐勝義行願二心是則悲智二德雖成助行闕三摩地心者無由得成佛實益故云云何能證等不空心要云𠰥不修此三摩地得成佛者無有是處可思之當知法爾應住普賢大菩提心法爾即本有義是簡顯得之言也無畏禪要云三摩地者更無別法直是一切衆生自性清淨心名為大圓鏡智上至諸佛下至蠢動悉皆同等無有增減但為無明妄想客塵所覆是流轉生死不得作佛此釋全同當𫨻文𠰥依安然菩提心義第一大日經如來定大空三摩地等皆攝此三摩地菩提心五相五輪等𮗚是顯衆生本有佛性兩部大經深意曾以不可有異也又三摩地者梵語翻為等持是心一境義也經䡄中云三昧是略語也或云三摩呬多翻等引或云三摩鉢底翻等至轉聲義別故於定躰有小異又於大小顯密雖有定躰不同而云之以心一境為義也一切衆生本有埵為貪瞋癡煩惱之所故明法爾所由謂一切衆生雖具足法爾佛性所以異始覺圓滿佛者為三毒所不得顯現也或學者一義云本有埵者衆生本來本有義不改三毒當躰即示㓛德品類生死即𣵀槃煩惱即菩提故更轉迷妄非成佛果也私案此義太無謂煩惱即菩提者深教大宗故置而不論之雖然於迷悟不同全不可之略出經云一切衆生所有堅固菩提名埵堅固菩提者衆生本有菩提堅固不壞義也然今為顯彼本有菩提所修法名三摩地菩提心是則下所明三密五相妙行也未云不修三密行之前直同始覺圓滿果位戒序云大毗盧那四種法身四種曼荼羅皆是一切衆生本來平等共有雖然被五障之覆㢢依三妄之雲翳不得覺悟若能𮗚日月之輪光誦聲字之真言發三密之加持揮四之妙要即大日之光明廓周法界無明之障者匆歸心海無明匆為明毒藥乍為藥五部三部之尊森羅圓現剎塵海滴之佛匆然涌出此釋依當假文意𠰥不改三毒妄躰者覺悟何時乎可悲之諸佛大悲以善巧智明起教元由性靈集第九曰大悲大日如來獨三昧耶妙趣悲嘆六趣之塗炭如實智雷震於法界殿祕密曼荼羅傳干𨶒浮提大悲約躰是後得智也善巧即大悲化用也𠰥依當假文并性靈集釋以理智法身法似為後得智作用凡此事古來諍論也具如別論之此甚深祕密瑜伽下所明五相三密法也令修行者於內心中觀日月輪以下示行者觀相內心者肉團心大日經第一云內心妙白蓮胎藏正均等云云疏第五云內心妙白蓮者此是衆生本心妙法芬陀利華祕密標𢡠華臺八圓滿均等如正開敷之形此蓮華臺是實自然智惠𮗚日月輪者疏第四云日喻本尊身月喻修習瑜伽行又云日喻本淨菩提心是毗盧那自躰月喻菩提之行準此釋日月輪𮗚共約喻月輪𮗚相如下明日輪𮗚相文不見推之就行者修𮗚邊明十六行相即十六三昧是也月輪十六分相配情見易了故委細釋之應其𮗚心所成就即本尊三昧也日輪喻即是也然則雖不示𮗚相行者十六三昧成就時自可顯歟然或學者義日喻煩惱是煩惱躰性即菩提㓛德故在纏世間出世其躰全同下所云但為日光奪其明性者即此意也此了簡不甘心頗不合釋旨趣歟委細至下可辨之由作此觀照見本心湛然清淨猶如滿月光遍虛空無所分別以下示𮗚心成就相本心者𠰥依安然菩提心義當第九識是則自性無垢本心也𠰥依蓮華部心䡄當第八識彼䡄文云藏識本非染清淨無瑕穢長時積福智喻𠰥淨滿月此文藏識者即第八識也𮗚智儀䡄又以自性無垢心為本源清淨大圓鏡智第八識即大圓鏡智相應此等本䡄文雖云第八識不取相分於自性本源明無垢清淨義然者或為第九識或云第八識唯是躰相不同也所歸可會一致歟亦名無覺了亦名淨法界亦名實相般𠰥波羅密海就以下文有二義一義云無覺了智淨法界理實相又理般𠰥又智波羅密海理智不二事點也一義云無覺了正躰智是約能緣智淨法界理是約所緣境實相般𠰥等理智不二能所平等義也二義中後義冝歟能含種種無量𭹀寶三摩地猶如滿月白分明以下示心德用大日經曰淨菩提心如意寶滿世出世勝希願可思之或義云上湛然清淨等約月輪清淨義今能𭇥種種等約月輪圓滿義前後喻意不同也前後相配一往雖可然釋旨趣強不作簡別歟於一物𭇥二意必不可別配也何者為一切有情悉𭇥普賢之心明月輪相類所由是則結上法爾應住等義之意歟我見自心形如月輪何故以月輪為喻為滿月圓明體則與菩提心相類正示心形相教王經第一云時菩白一切如來言世尊如來我遍知已我見自心形如月輪略出經云行者既見智所成月白世尊言我見月輪清淨性相慈覺曼荼羅問答云和上法全云心如月輪者此非唯喻意心躰此月輪何者心法界躰非長短方圓非青黃赤白亦是長短方圓一也亦是青黃赤白也或云取圓滿月只喻心躰福智圓滿非謂心全躰即是月輪者此不得心躰法界之色法界之用耳此等文同當假釋然守護經第二攝真實經中心地𮗚經第八等以心躰月輪相為初心行者所觀然者似相違仍此篇目古來未決也具如別論也凡月輪有一十六分喻瑜伽中金至金舉有十六大菩者義釋第五云甘露有十六分乃至以十五分遍衆生以所餘一分還生青龍䡄下云甘露有十六分十五有情一分還此等文於月輪雖明十六分不同當𫨻文當𫨻意以晦夜合宿一分並白月十五分為十六分以相配十六三昧不空仁王般𠰥陀羅尼釋云於瑜伽教中成普賢行十六如聲聞見道中十六行也此文以十六三昧配聲聞十六行十六三昧者即盡普賢行願始終是真言行者修證次位也疏第二曰然此經宗從初地即得入金寶藏故𠰥解金頂十六大菩生自當證知也大日經十地金剛頂經十六大生其位全同也以金剛三昧為最初以金拳三昧為最後究竟於之有學者異義一義拳菩生即究竟果位也一義云十六生外立佛果圓滿一位此事一箇算題也今謂於拳菩生可有正滿已滿二位約正滿十六隨一故指屬因滿𠰥約已滿成十六分躰故是則究竟圓果也準起信論菩地盡句可解之於三十七尊中五方佛位各表一智也祕藏記云五智釋名法界躰性智者謂三密別數過剎塵名之法界諸法所依故曰躰也法然不壞故名為性決斷分明得以為智大圓鏡智者謂自他三密無有邊際名之大也具足不曰圓實智高懸萬像影現鏡之喻也平等性智者性淨智水不簡情非情故彼此同如故常住不變故名曰平等性智妙𮗚察智者五眼高臨邪正不謬因以為名成所作智者二利應作故曰所作妙業必遂成稱也以五智配五佛是一往相配也開法身如來四智㓛德為四佛而配四方非各別佛安然教時義第一云諸佛菩皆在十方隨於何國猶是東方阿閦即菩提心故𠰥約真如法界躰性則此一一之諸佛菩互具四門故𢏏𨹔為菩提心亦以阿閦為成菩提乃至皆然此釋意諸佛各具五智故約何佛大圓鏡智東方即菩提心表示也乃至平等性智亦如是是則一佛上隨方布教摽𢡠也發心修行菩提𣵀槃不亂其次第之意也然南都德一未決中以五佛五智相配為未決之一是不知祕密教深義故也東方阿閦佛由成大圓鏡智亦名金智也南方寶生佛由成平等性智亦名灌頂智也西方阿𢏏陀佛由成妙觀察智亦名蓮華智亦名轉法輪智也北方不空成就佛由成成所作智亦名羯磨智也中方毗盧那佛由成法界智為本東方阿閦等者梵語翻為不動佛四佛四智相配如心要釋又八識四智相應等如理趣釋本文廣博也披而可見之問以平等性智名灌頂智其意如何平等性智者南方寶部也入壇灌頂事業是福業所作故寶部三摩地尤相應仍名灌頂智歟問以妙觀察智為蓮華智其意如何蓮華者一切衆生本性無垢心蓮也以如來邪正不謬五眼觀察彼無垢本性起法用是名轉法輪蓮華即大悲三昧表示也以蓮為西方尊形職而斯由也然者約大悲能緣名妙𮗚察智約衆生本性名蓮華智歟已上四佛智出生四波羅密菩焉四菩即金寶法業也三世一切諸聖賢生成養育之母出生義云由四如來智出生四波羅密菩焉蓋為三際一切諸聖賢生成養育之於是成法界躰自受用身則之正中毗盧那如來四親近菩則四波羅密焉此文全同當假釋此外慈覺金剛界次第安然金界對受記第三等皆以四波羅密為四佛所流出然祕藏記明四方部毋中四波羅密出生四佛之義釋之甚似相違更可決之於是成法界體性中流出四佛也聖位經云然受用身有二種一自受用二他受用毗盧那佛於內心證自受用四智從四智中流出四佛各住本方坐本座疏第廾云然此八及中胎五佛四菩豈異身乎即一毗盧那耳四方如來各攝四菩東方阿閦佛攝四菩金金剛王金剛愛金剛善哉為四菩也南方寶生佛攝四菩金寶金光金幢金笑為四菩也西方阿𢏏𨹔佛攝四菩金剛法金剛利金剛因金剛語為四菩也北方不空成就佛攝四菩金業金護金剛牙金拳為四菩也四方佛各四菩為十六大菩也於三十七尊中除五佛四波羅密及後四攝八供養但取十六大菩為四方佛所攝也當𫨻舉三十七尊之意為取十六大菩也是則舉十六三昧喻月輪十六分令知真言行者修生轉證義也謂三十七尊本有㓛德所成就躰十六三昧修證要法即轉證次第也又此十六三昧者即四智㓛德也在果位為四智為因行開之即為十六三昧或學者義本有修生各有十六者未得其意也又摩訶般𠰥經中內空至無性自性空亦有十六義以十六大生比擬般𠰥十六空是有法躰譬喻二意菩提心義第一云問論云又摩訶般𠰥經中內空至無性空亦有十六義者是例歟喻歟亦例亦喻何者彼般𠰥中或明十一空十四空十六空十八空二十空且以十六空為處中義今雖三十七尊且取十六大菩者是例又彼十六空對破十六有今十六大菩亦破十六惑障故亦喻也此中二義云之相例意而非法躰同金剛般𠰥閧題云十六會則金界十六大菩三摩地門也故龍猛菩提心論云從內空乃至無性自性空十六空門皆是寶等十六大菩之三摩地門此十六大菩三摩地法門能攝一切法教應化隨機之多名淺略之義𠰥為大度種性真言深祕故此釋意法躰同義也釋意甚深也能可思之也且列十六空名義大般𠰥四百八十三云不取內空不取外空內外空大空空空勝義空有為空無為空畢竟空無際空無散空本性空相空一切法空無性空無性自性空同五百十二云善現一切法皆以十六空為趣諸菩摩訶於如是趣不可超越慈恩心經幽贊下云如大經中或十六謂內空外空內外空大空空空勝義空有為空無為空畢竟空無際空無散空本性空無相空一切法空無性空無性自性空或十七加無所得空或十八又加無性空或十九別加所依增上及互無空或二十於十八空中離無散空智論第三十三中邊論等中有之釋文廣博故不能引載又安然釋十四空者本據十八空論中有之又十一空者指黃性所歟一切有情於心質中有一分淨性衆行皆備其體𭫸微妙皎然明白於心質中者心質即肉團心也疏第三云凡人汙栗馱心狀猶如蓮華合未敷像有脈約之以成分男子上向女人下向先𮗚此蓮令其開敷為八白蓮華座此臺上當觀阿字作金色此釋於凡夫心所心示甚深觀想上引大日經文內心妙白蓮者即是也一分淨性者指本覺佛性六度經云一切有情本智如日疏第三曰如真言中有質多字淺略只名為心𠰥作深祕釋者質謂字𭘧三昧聲也是無遷變之義無遷變即是佛性此等文或云本智或云佛性皆是衆生自心也當假一分淨性者即是也衆行皆𬾨等者蓮華三昧經云歸命本覺真法身常住妙法心蓮臺本來具足三身德三十七尊住心城普門塵數諸三昧離因果法然具無邊德海本圓滿還我頂禮心諸佛本覺佛性無邊㓛德圓滿而在纏出纏曾不增減故嘆其㓛德云皎然明白等也乃至輪廽六趣亦不變易如月十六分之一輪廽六趣者心地觀經第三云有情輪廽生六道猶如車輪無始終智論第十六云菩得天眼𮗚衆生輪轉五道廽旋其中天中死人中生人中死天中生天中死生地獄中地獄中死生天上如月十六等者以下又譬也凡三摩地假法譬前後交𮦀其中以月輪十六分相配十六大生是一𫨻詮要也即於當𫨻顯其意十六分之一者即晦夜合宿月輪也凡月其一分明相𠰥當合宿之際但為日光奪其明性所以不現晦曉日月同時相過故月輪光一向隱不現以之喻衆生本有佛性所覆三毒迷妄不顯上為貪嗔癡煩惱之所故者即此意也𠰥依安然菩提心義以合宿月輪類本有位合宿一剎那後日月一分相去以月光少現喻修得金剛菩提心義第一云晦夜合宿剎那月光皆隱𠰥一分過月光少現是同夜故此夜一分之明亦暗亦明故喻本有亦喻修得𠰥不爾者豈有十六大菩初一性得後十五修得乎此釋意十六三昧行者修得三昧故以金三昧𠰥偏同本有喻合宿暗夜者修生十六一分闕故於合宿月成亦暗亦明釋謂暗本有明修生金剛也私按此了簡必不爾歟謂約行者十六三昧皆修生也而金三昧示一切衆生本有義故是喻合宿月於行者修證邊雖有淺深次位於十六三昧曾不可有明昧不同是則十六大菩內證故然如安然了簡於十六大菩似存明昧不同學者留意能可思惟之後起月初日日漸加至十五日圓滿無礙後起月初者是有二義菩提心義第一云問天笁黑前白後而何故論云後起月初日日漸加耶是譯者廽天竺語隨唐國法此釋意付云月初違天竺黑前白後法歟然翻譯三藏隨唐土法回文故不相違也般𠰥寺疏鈔云私云天竺曆法以十五日為一月又以黑月為始以白月為後龍樹云後月漸增至十五日圓滿無礙此釋意以當假文為黑前白後本據謂後起月者即是白後意也兩釋相違末學難是非者歟所以觀行者初以阿字發起本心之中分明只漸令潔白分明證無生智以下法譬合釋也真言行者於阿字本不生𮗚解躰逹時開顯本心是名本有心月上文我見自心形如月輪者是也此本有心月顯現次第有前後即以十六大生盡其首尾地前地上有相無相等次位可在此中委細如下釋本心者如上云可有八識九識二意分明者即上一分淨性也漸令潔白等譬日日漸加意也無生智是本覺自然智上所謂無覺了也夫阿字者一切諸法本不生義吽字義云阿字實義者有三義謂不生義空義有義又不生義者即是實境界即是中道真言問云阿字門本不生理是虛空無垢大菩提心之地亦一切如來平等種子故諸法者阿字字相是諸法能生義也本不生者字義即一實中道意也或學者義本不生字相以不可得為字義者未得其意也準毗盧那經疏釋阿字具有五義一者阿字短聲是菩提心二阿字引聲是菩提行義三暗字短聲是證菩提義四惡字短聲是般𣵀槃義五惡字引聲是具足方便智義又將阿字配解法華經中開示悟入四字也開字者開佛知見即雙開菩提心如初阿字是菩提心義也示字者示佛知見如第二阿字是菩提行義也悟字者悟佛知見如第三暗字是證菩提義也入字者入佛知見如第四字是般𣵀槃義也而言之具足成就第五𢙣字是方便善巧智圓滿義也付此注有兩義粗如上云菩提心義第一云大日經義釋亦名義是一行記何以不空三藏引為證乎問𠰥爾菩提心論亦云準毗盧舍那經疏是豈非不空引一行記乎彼是後人引彼疏文注入論中爾有論本是書長行者寫生誤實範上人大經要義第三云私撿二師文貞元録等一行開元十五年長逝春秋四十五不空神龍元誕迹明知當禪師行年二十三三藏誕生也法弟三藏譯此論日注入先哲禪師疏文寧可怪乎濟遷僧都私抄大同之以上二義雖異於唐朝注入大日經疏文天竺根本論非有之疏第十一云次真言躰阿上阿上引暗噁此四字是此一部經中正宗躰也一切祕藏皆從此生即是毗盧那佛心也同第十四阿等四字相配因行證入四轉之釋有之釋文廣也披而可見之又同第二十有方便具足𢙣字釋依此等前後釋得意配釋五轉義故云準毗盧舍那經疏等準字意顯非全文也又將阿字等者智證義釋目録云諸本中二十卷已前三本者與興善三藏菩提心中注不合不以法華開示悟入對釋四種阿字故慈覺大師並圓珍本與彼論合也有以開示悟入對四種阿字是故勝劣易知自餘得失互不免之菩提心義第一云高野二十卷脕此文也慈覺大師遍明和尚圓覺僧正等本並有此文也故知高野抄本去大原四十帖云四種阿字配開示悟入事義釋有之疏無之弘法大師祕之抄出為別卷法華大日二教為一部之意可祕之故也依此等釋四種阿字法華四佛知見配釋事疏中自本有之即慈覺智證等請來義釋中有相配釋東寺所二十卷疏中無之依安然長宴等意大師去之也學者一義云大日經以四種阿字為宗法華經以四佛知見為宗而疏中處處釋兩經一致旨所謂疏第七云此經本地常身又是妙法蓮華最深祕處又云此中開示即是佛知見與法華義同準此等意不空三藏作注釋而義釋中直書加配當釋事是後日治所為也安然菩提心義云此義釋本三藏一行智儼溫古治故本記外多加人言可思之又學者一義云又將阿字以下不空三藏得法華意作配釋非疏中云有之而因準毗盧舍那等注釋有此釋故後人誤而書加義釋中此又治失也又字起盡可思之以上二義雖有少異大違他門所傳私案二義中後義冝歟智證大師以無四阿四佛知見配釋文為疏失恐似任推意玄肪僧正道慈律師等請來義記等是皆疏根本未治本也此等本既以無配釋文然者後日治為本不可疑根本又大師非去之而安然長宴等云大師去依慿在何乎恐可謂暗推歟惣而言之等者法華中不方便具足義故作此釋大日經亦不第五惡字疏家加之疏第二十云入中𢙣長聲字是方便也此是毗盧舍那本地之身華臺之躰超八處非有心之境界準此意法華四佛知見具足亦是方便究竟義也法華開題云所謂開示悟入四字與大日經四種阿字義趣大同弟五𢙣字方便具足義此經無弟五義理必合有此釋同當假意能可思之即讃阿字是菩提心義頌曰上以阿字為諸法本不生義今為菩提心義是則自心本有菩提心本初不生意也疏第十四云以最初阿字為真言之躰以此字門即是菩提心本原同第二十云初阿字在東方如梵音阿字即有動首之義以順世間法諸方中東為上故喻菩提心最是萬行之初也其名曰寶幢佛此等文以阿字為菩提心義即東方寶幢佛內證也東是方初阿字諸字本源諸法能生菩提心萬行最初佛果萬德即依之成故相類深義即在斯者歟八白蓮一肘間炳現阿字素光色禪智俱入金剛召入如來寂靜智三摩地儀軌云八蓮華一肘間炳現阿字素光色禪智便入金剛召入如來寂靜智此䡄文全同當論一肘間者有二義一義心月輪量也謂白蓮上𮗚一肘月輪也一義前一肘也是去自身量也心月輪量者依蓮華部心䡄歟前一肘者金剛界祕要記云𮗚想前一肘間有月輪居於白蓮華上其月輪中有阿字此釋依準當假文歟無畏禪要去身四尺𮗚一肘月輪云云諸䡄中明月輪量云一肘故𠰥心月輪𠰥前一肘共以可𮗚月輪月輪白色故一義指阿字光明依此二義非云阿字色𠰥然者阿字色如何可𮗚之乎𠰥準𮗚自在心真言儀䡄可𮗚金色彼文云於蓮華中想阿字放金剛色可思之𠰥依金剛智如意輪儀䡄可𮗚白色彼文云𮗚前八蓮其上置阿字色如珂雪流散千光明此文珂雪者即白色也禪智俱入等者以下二句明相是則蓮華部心䡄所入智也但此事付法流有深祕口授不可載靣也寂靜智者示阿字㓛能守護經云阿字者一切法寂靜躰本不生示無過之義可思之又疏第八釋阿字云如來以此一字義故去至本性常寂大𣵀槃中也阿字躰是本寂以具三昧畫故善逝具淨除點故𣵀槃不動是處即行即到同於大空無所不遍故云大寂阿字字義本不生也然今云寂靜智是當阿字字義依疏家釋阿字躰本寂於不生阿字直示本寂義然者非相違然或學者義以蓮華部心䡄入智明為本據以末一句真言即日羅吠舍之明是也此了簡不甘心凡今一頌明阿字菩提義觀念時可三密相應雖不待言如來寂靜智文全非示真言唯是阿字㓛能即本有無漏智也扶會阿字者揩實決定觀之當𮗚圓明淨識以下約心內圓明具示本有菩提心顯現相扶揩實三字異本直作夫皆是三字也圓明淨識者八識九識二意具如上解焉𠰥𦆵見者則名見真勝義諦𠰥常見者則入菩初地𠰥轉漸增長則廓周法界量等虛空卷自在當具一切智以下至具一切智文有三節初𦆵見等地前即心外有相成就也次𠰥常見等初地以上即心內祕密成就也後廓周法界等即第十一地妙果也準守護經第二心地𮗚經第八並無畏禪要等有五種三昧一者剎那三昧二者微塵三昧三者漸現三昧或云白縷三昧四者起伏三昧五者安住三昧也依禪要釋此五中初四種地前第五一種初地以上也當假𠰥𦆵見等者即當初四種三昧見真勝義諦者勝義名雖在初地以上心外所顯有相成就即是心內祕密影像一分故非相違猶如空月水月疏第四云以三密加被自見心明道時乃知種種名言皆是如來密可思之𠰥常見等者疏第三云經云為彼從初發心乃至十地諸菩者謂初發淨菩提心時見此曼荼羅已遍法界升第二住又逾廣逾深作十轉開明乃至第十一地而後所見圓𭫸此文逾廣逾深等者當𫨻𠰥轉漸增長意即地地遷登義也廓周法界者以下當第十一地果一切智者即佛果一切智智也疏第一云今謂一切智智即是智中之智也非但以一切種遍知一切法亦知是法究竟實際常不壞相可知之凡修習瑜伽觀行人當須具修三密行證悟五相成身義也所言三密者一身密者如結契召請聖衆是也二語密者如密誦真言令文句了了分明無謬悮也三意密者如住瑜伽相應白淨月圓滿觀菩提心也以下明三密五相法躰是則當論所釋肝心餘教不共祕要也一切衆生本有大菩提心所顯即此三密加持力用也即身義云𠰥有真言行人𮗚察此義手作契口誦真言心住三摩地三密相應加持故早得大悉地故經云三密金以為增上緣能證毗盧舍那三身果位真言問云身密語真言心妙𮗚平等相應至大日尊遍一切處三平等究竟實際𠰥三密中一闕即不能至平等處如車一輪闕都無所到是即三平等義也三密相應得不思議益準此等文可知之密誦真言等者真言問云其聲念誦者為如何耶經云凡誦真言時其聲不高不下不急不緩如流勿間字字分明句句相應如住瑜伽等者疏第十一云於真言門中心住一境而不散亂如𮗚字𮗚聲大尊種子隨於一事心不外緣即能得大成就𠰥心在散亂設經無量劫中欲求成就尚不可得何况一生現得法利耶儀䡄本經所明意密者專𮗚本尊形色等當𫨻不爾直𮗚菩提心是則以本有菩提心顯現為一論大本有菩提心者即金剛㓛德也下釋其圓明則普賢身者即此意也次明五相成身者一是通逹心二是菩提心三是金心四是金身五是證無上菩提獲金剛堅固身也然此五相具備方成本尊身也其圓明則普賢身也亦是普賢心也與十方諸佛同之亦乃三世修行證有前後及逹悟已無去來今五相成身等者十八會指歸云五相所謂通逹本心修菩提心成金心證金剛身佛心圓滿略出教王兩經並蓮華部心䡄等具五相瑜伽初通逹心者是初地當上𠰥常見者位次菩提心者即修菩提心是則本有圓明心次第漸增位當上𠰥轉漸增長位次金剛心者即成金剛心是前圓明心卷自在位也依蓮華部心䡄於是可𮗚三摩耶形則八蓮華是也但依五部可有三形不同也次金剛身者即證金剛身是於本有圓明心月輪上所𮗚三摩耶形轉成自身位也次證無上菩提等者即佛身圓滿當具一切智位也攝真實經守護經心地𮗚經等又五相但一相或三相五相不周備覺超僧都五相成身私記云真實經五相心地經三相守護經一相是深祕相也教王經略出經十八會指歸等五相四種曼荼羅祕中深祕也攝真實經等雖五相成身不可同略出教王等所慈覺蘇悉地經疏云或大乘經雖粗明真言契而支分不具未盡佛意此釋或大乘經者指守護心地等經覺超僧都祕中深祕外立深祕相攝守護心地等經尤有其意者歟其圓明等者以下明佛身圓滿躰性略出經第三云普賢法身遍一切能為世間自在主無始無終無生躰性常住等虛空今普賢身者指法身因果𠰥約因德當金剛內證上文一切衆生本有者即是也又於法身因果有理智二德理即身智即心也當𫨻於普賢圓明躰作身心分別即此意也與十方諸佛同者舉例也始覺圓滿後二利㓛德與十方如來等而不可有異也三世修行等者佛身圓滿位契當真如法性理之時永廢古今相理趣釋云一切時者在於異生時後證聖果時三業清淨猶如虛空可思之又華嚴大疏云夫心冥至道則混一古今同演義抄云心與理𡨋契則無古今之相此等釋於心理相應位古今相亡與當𫨻釋其意全同也凡人心如合蓮華佛心如滿月此觀𠰥成十方國土𠰥淨若穢六道含識三乘行位及三世國土成壞衆生業別菩因地行相三世諸佛悉於中現證本尊身滿足普賢一切行願凡人心等者疏第十二云一切衆生心即是蓮華三昧之因以未能令開敷故為諸煩惱等之所纏繞所以不能自了其心如實之相祕藏記云據密教凡夫心如合蓮華聖人心似開蓮華此等文同當𫨻釋凡心者即心所心也問祕藏記以蓮華開合示凡聖不同其意顯了也又五重結護云菩未證佛果滿德未開以開蓮華喻佛以合蓮華喻菩也此釋約因果二位以蓮華開不開作喻而當𫨻釋以佛心喻滿月喻意不齋也其意如何道範義云蓮華胎藏也胎藏因故以在纏心為合蓮月輪金剛界也金果故以滿月為佛心是因果蓮金表示也此了簡難思之凡取喻無盡也不可局定其中以凡心為蓮華偏非譬喻上引經疏文以凡夫心所心直為八蓮華當𫨻又此意也次以佛心為滿月是則當論大也謂約十六三昧明十六分月輪次第增明義今佛心如滿月者至十五日圓滿無礙意也於此心月圓滿位成理智二德理即胎藏智即金剛也約本覺理智共本有而其德用未顯約始覺理智二德同時顯現而無所殘𠰥如道範義以理偏名因以智偏名果還似失宗深義能可思之此觀𠰥成等者以下佛果圓滿後染淨迷悟相同時示在自心三世國土成壞者世界成壞三世無止成成劫壞壞劫也住劫空劫等亦自可在此中也悉於中現者指行者始覺自心即圓明心也祕密曼荼羅品疏云謂於行者自心之中而具佛惠大海十方通同為一佛土唯自明了他所不見故名祕密曼荼羅可思之普賢一切行願者即十六三昧也詳如上之故大毗盧舍那經云如是真實心故佛所大日經第三成就悉地品文也彼品摩訶意處曼荼羅云無垢妙清淨圓鏡常現前如是真實心故佛所疏第十二云摩訶意處名曼荼羅者心處亦可名為心位即指此衆生自心之處即一切佛大悲胎藏曼荼羅也摩訶意處曼荼羅者即衆生自心曼荼羅也彼本有曼荼羅顯現開發時十方三世依正二報染淨迷悟等諸法悉備一心故引此經文釋成三世諸佛悉於中現等義也疏第十二云此行從心而生心為照明能見如來之道行此心處無垢清淨猶如圓鏡常現前當知此即是先佛共所宣真實之心也真實心者即圓明本心也故佛者舉例是則法身如來舉過去佛所例示今所不誤也問法身如來無始無終凝然常住也指何時云故佛乎真言問云問大日者是即法身何故更次云成佛耶此有三意一者大日指今果成佛者指昔時謂大日世尊顯昔成佛之初事故云大日成覺大日法身雖凝然常住非無成佛始故兩部大經共示故佛例瑜經云往昔寶生佛於金剛界中度無量有情我今故演大日經開題云諸佛如來必因師而覺故文云故佛所宣一切如來必待師教緣雖得覺悟果德圓滿後永絶今昔指此位云無終不動此無始無終平等本源所教名兩部大經異他受用應化佛逗機法義固密教深旨以常情不可測量也問前言二乘之人有法執故不得成佛今復令修菩提心三摩地者云何別二乘之人有法執故久久證理沉空滯寂限以劫數然發大心又乘散善門中經無數劫是故足可猒離不可依止以下當假餘義問也付此問有學者異義一義云問意覺即凡佛躰者何故修五相三密等行乎發心即到機不可待修行是同二乘有法執故直不證一切智智非疑三摩地修行似法執也意雖開自身即佛覺無始無明直難改故修三摩地行得證一切智智也一義道範云問意三摩地修行似二乘有法執意真言行者遇自身即佛教之時顯教所斷人法二執即知輪圓具德故云既破人法上執也此二義共不分明乎私案問意以三密事相修行相類二乘法執違無相無為真理疑之歟意領自身是佛教旨時人法二執既破之故不足疑雖然無始無明等未斷盡之者本有佛性速疾難顯故未得佛果一切智智依之以三密五相行為增上緣能逹諸佛自性也凡近代學者付自身即佛旨發心即到機不得三密修行云可成佛恐任自見作了簡歟如愚案者於釋前後更無所可妨學者能思之散善門等者堀池僧正抄云應化所無明緣起法故散善門非三摩地門又上人釋云顯名散善門密稱三摩地門此等釋以一代諸教惣攝散善門當假釋正指相假中經劫修行菩云又乘散善門等雖然七八九三箇住心未知三密神通祕要故可攝經劫散善門中歟然者於當假文可有兼正二意也今真言行人既破人法上執雖能正見真實之智或為無始間隔未能證於如來一切智智故欲求妙道修持次第從凡入佛位者疏第一云如餘離方便諸菩漸次修習戒定智惠於無量劫以種種門觀人法二空猶未能離心之影像今真言行者於初發心時直𮗚自心實相了知本不生故即時人法論淨𠰥虛空成自然覺不由他悟此釋同當𫨻意於是有二義一義云人法上執常人法二執即大日經所細二種妄執也無始間隔即第三劫𭫸細妄執也遍滿記存此義一義云人法上執言攝大日經三妄執無始間隔即當微細妄執是即三妄執地前所斷情分齊也微細妄執表德實際上所具十重微惑也於初地以上作十轉開明即此意也此二義中後義宜歟極細妄執者法執氣分故上執言可攝之也問以微細妄執為初地以上表德所具惑本據如何又以初地淨菩提心為自證圓滿𭫸位近代學者一同所判也然今義大違初地即𭫸義然者此等義難思如何以微細妄執為初地已上惑不待言疏第七云菩提心猶有所依故未名正遍知如來已度此微細論進趣都息故名超越心地此文微細戲論者即微細妄執也此微細妄執佛果能障惑故為表德智所斷逾深作十轉開明乃至第十一地所見圓𭫸者即此意也次以初地為佛果𭫸位者其本據在何處乎經疏本文曾未見之祕藏記云越三妄執越三僧劫是則十地究竟也過此修上上方便斷微細妄執至佛果故經曰此四分之一度於信解以微細妄執為十地𭘧惑釋文明鏡也誰可疑之乎故初地即𭫸義大背文理者哉故欲求等者故字決定意謂決定上義也妙道者即佛果大道修持次第者即三密修行也此三密行從凡入佛祕術故云從凡入佛位等或義云修持次第等次第證行相是約漸機從凡入佛等頓超行相是約頓大機也此了簡太不可也頗不合問旨趣又背文首尾問意曾不疑頓漸行相於豈成頓漸分別乎於機有頓漸超三類雖有成佛遲速共以三密行為證入良緣一論所釋唯在此事者歟即此三摩地者能逹諸佛自性悟諸佛法身證法界體性智成大毗盧那佛自性身受用身變化身等流身以下當經釋或義云即此等六字以下能逹等表句也此義難思以三摩地行者修生轉證為旨趣何於此中分別表釋乎能逹諸佛等者示自證㓛德遍滿記云能逹等本地法身悟諸佛等自受用身證法界等他受用身此義難思以法界躰性智為他受用身大違自宗定判不可依用也又道範義云諸佛自性者智諸佛法身者理法界躰性智者事是即性淨圓明三點性德也此三點胎藏次大毗盧那等四身金剛界也此了簡兩部配屬強無詮旨歟今云諸佛自性者理諸佛法身者智也理云逹智云悟尤有其意歟證法界躰性智者理智不二是即行者修證𭫸處也成大毗盧等者祕藏記云此四種身者為一身所具為各各出生此四種身耶一身之所互皆具足中臺毗盧那為法身四佛為應身釋迦為化身外金剛部龍鬼等為等流身大毗盧那佛惣句自性以下別句即四種法身也一義云大毗盧那惣躰惣德即法界身也自性身等阿閦等四佛即是五種法身義也五種法身事上人五輪九字祕釋中以聖位經並法界身文為依慿立之凡四種法身外立法𤰪身否一箇也當𫨻釋強非五種法身義歟以四身名大日聲字義釋明鏡也然者以大毗盧那為𢝰句義合釋相歟為行人未證故理冝修之以下十字結義疏第一云或有言但觀心性無相無為不應種種紛動行菩道此非也如以四種不生觀礦中金性雖復在因在果常自無減無增𠰥不以方便消融滓穢即此不生之金無由可得行人亦復如是𠰥不以三種祕密方便供養行門消融百六十心礦石之垢何以得此淨菩提心𠰥以大悲萬行種種鍊冶得成神變加持不思議業故不應未得謂得保初心為𭫸果也此釋全同當𫨻意或學者義道範以為行人等二句為宿善分齊宿善者非宿生未證以前精進修行皆為宿善也此了簡太背文理歟不足信用也故大毗盧那經云悉地從心生如金剛頂瑜伽經一切義成就菩初坐金剛座取證無上道遂蒙諸佛授此心地然能證果以下舉二箇文證結成義初文大日經第三悉地出現品文也彼經文云當知真言果悉離於因業真言者當得悉地從心生疏第十一云真言者當得悉地從心生者當知真言行者但以方便自淨其心𠰥三業清淨當於是中自得明了而自覺悟也譬如有人夢中修行種種六度而淨佛國覺見則無成果之相但是一念無明心中有因果萬行耳五智三身果等由他非得併從行者自心所顯也為成此義引今經文雖心自證心非不假方便其方便者即三密方便也如金剛頂等者教王經第一文得意引證之非全文一切義成就菩者金剛頂經能教王因位名也此意菩修無識身三昧證一道清淨理以為究竟而依虛空油麻諸佛驚覺授五相瑜伽證一切智智授此心地者即五相瑜伽也此五相成身是行者心中所備本有㓛德故云心地道範義云金剛頂經引證有二義一云一切義成就迂回菩於顯教經三無數劫將成佛時蒙諸佛驚覺五相成佛今人直從真言門發心決定不起干座三摩地現前是引迂回證直往頓悟也一云釋迦如來為即身成佛人證成自家即身頓悟義一切義成就者悉馱太子也悉馱太子即身成佛為果後方便示現經劫成佛行也私案此二義共不詳當假三摩地一𫨻餘義問結釋也然問意以三密修行類法執發疑斷彼疑云行人未證故理冝修之因此釋引今經文意云教主如來既應三摩地修行成自受用究竟正覺是即以教主因行令例知一切真言行者修證義未必問頓悟頓成義歟即身頓證義此論挭溉所釋指歸故今始而非可疑也凡今之人𠰥心決定如教修行不起干座三摩地現前應於是成就本尊之身以下當餘義今人者指一切真言行者即未世今時人也瑜經曰未法世人長誦之真言刀兵不能害水火不燓漂𠰥誦一百遍能百劫罪𠰥誦一千反能成滿意願𠰥誦一洛刃得大金剛身𠰥誦一俱胝得成遍成尊菩提心義第一云今未世設修此觀即身成佛之人亦應隱形一如常人非有緣人誰見其佛經䡄中明未世得益雖然悉地成不可依信修有無當𫨻釋即顯此意大師釋曰人法法爾興廢何時機根絶絶正像何別雖顯人法法爾教旨頓不得益者不堪如教修行故也故大毗盧那經供養次第法云𠰥無勢力廣增益住法但觀菩提心佛此中具万行滿足淨白純淨法也大日經第七卷文也於此經有題額不同一本如前六卷一本如當𫨻所引不思議疏所釋題大同當𫨻所引凡就此經者有種種異一無畏三藏撰出一逹摩掬多所造一文殊所造一大日直此四中無畏撰出者以兩本義釋為本據覺𫟍師演密抄中成此義掬多所造者安然和尚持誦不同第四菩提心義第一等釋之文殊所造者不思議疏釋也直佛者以十萬頌廣經作三千餘頌略本以彼略本譯為七卷經佛廣經略本故類前六卷直云佛也此四中掬多所造者安然私了簡也本據不分明於自餘三古來學者為難決篇目具如別論之問今經文引證旨趣如何私云以普賢本有菩提心顯現圓滿為三摩地𫨻詮要而上舉三箇文證悉地從心生之旨雖結成之直於本有菩提心觀顯文證未引之故於結句引證其文所謂住法但𮗚菩提心者是淨菩提心即當𫨻最初所釋法爾應住普賢大菩提心是也故𠰥無㔟力等雖一句非今所用是同文故來也然則菩提心觀顯處所具因行萬行異三密四曼等本有法戝當𫨻所引以菩提心處具足萬行為肝心歟學者留意能思察之不思議疏上云淨白純淨法者於躰理中恆有得恆沙性無漏㓛德及布等諸度門也此菩提心能包藏一切諸佛㓛德法故𠰥修證出現則為一切導師以下論主所釋也包藏一切諸佛㓛德者不思議疏所云恆沙㓛德六度等諸度門也𠰥修證等者修修𮗚證證入也一切導師者正指第十一地佛果兼約初地以上等覺等修證出現是在初地以上故也𠰥歸本則是密嚴國土不起干座能成一切佛事以上約化他以下約自證歸本言正示自證本源歟密嚴國土者瑜經云唯此佛剎盡以金剛自性清淨所成密嚴華藏密嚴經云不捨欲界中成佛作佛事要往密嚴證無上覺以自性法身所居土密嚴國土又名華藏世界天台寂光土是唯智所照真理寂靜境界也自宗意於此位存色相莊嚴言法本地自證法者即是也能成一切佛事者大悲行願化度衆生等事也於修證出現位能成廣大佛事故云不起于座等也讃菩提心曰𠰥人求佛慧通逹菩提心父母所生身速證大覺位𠰥人求等者此一頌𢝰而一論結文別而中餘義結釋也初一句約能求所求機論初所謂我今志求阿耨菩提人是也次一句約所修𮗚想後二句示成佛得益通逹菩提心者是有二義一義指五相中最初通逹心最上頓機人於通逹心位可成佛也一義指佛身圓滿是以五相惣德云通逹菩提心也此二義共不穩愚案發心決定上以如教修行位云通逹菩提心歟𠰥不依三密五相行何以可通逹乎是以灌頂文舉當論三門行相云𠰥有四衆能察此趣手結契口誦真言心𮗚實相如教修行則不經三大劫速證大覺位故經云𠰥人求佛等此文依慿今頌文明知通逹者如教修行義也然世或學者以今一頌為發心即到義恐似不得釋旨趣也父母所生身者不轉肉身意也無畏尊勝破地獄䡄云𠰥有衆生最上根人常日夜三時持念𠰥時時尅尅憶念定此人不捨父母所生身現身當得不思議難得佛身此文同今釋上根上智人現身成佛得益專如教修行之㓛力也疏第一釋頓覺成佛神通乘相云今此真言門菩𠰥能不法則方便修行乃至於此生中逮見無盡莊嚴加持境界非但現前而已𠰥欲超佛地即同大日如來亦可致也論主並疏家宗家等解釋一揆也誰閣此等明據豈可求異端乎學者能可分別也金剛頂瑜伽中發阿耨多羅三藐三菩提心論也應永十有二年季復三伏天於高野山西谷之草庵復中籠山之間依客僧等所請講菩提心論次令勝義行願二𫨻口筆焉於三摩地𫨻略之然依桑城闍梨之南都律宗大望三摩地𫨻重而口筆焉同𥊸三人同宿祐潤師豪等十一箇月之間抄記畢所詮之旨趣多違近世學者之所解頗不足為南指却羞後人之玄覽𠰥於萬分之一會法理併奉資高祖之報恩爾小野末資權僧正實順寬文九己酉秋九月之吉前川茂右衛門尉劂
